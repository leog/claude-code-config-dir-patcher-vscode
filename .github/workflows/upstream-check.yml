name: Upstream patchability check

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Cheap step: one marketplace API call to resolve the latest versions, then
      # derive a cache key from (resolved version+platform set, patch logic hash).
      # No VSIX downloads happen here. Exit 2 (marketplace error) leaves the key
      # empty so the cache lookup is skipped and the full check runs as a fallback.
      - name: Resolve cache key
        id: key
        run: |
          set +e
          node scripts/check-upstream-patchability.mjs --print-cache-key
          code=$?
          set -e
          if [ "$code" -ne 0 ]; then
            echo "::warning::Could not resolve cache key (exit $code); will run the full check without cache."
          fi

      # A cache hit means: same upstream builds AND same patch logic as the last
      # green run. The cached value is just a sentinel marker; restoring it is
      # enough to know we can skip the ~24 VSIX downloads.
      - name: Restore previous pass marker
        id: cache
        if: steps.key.outputs.key != ''
        uses: actions/cache@v4
        with:
          path: .patchcheck-pass
          key: ${{ steps.key.outputs.key }}

      - name: Skip note
        if: steps.cache.outputs.cache-hit == 'true'
        run: echo "Cache hit for ${{ steps.key.outputs.key }} — upstream builds and patch logic unchanged since the last passing run. Skipping the full check."

      - name: Run patchability check
        id: check
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          set +e
          node scripts/check-upstream-patchability.mjs
          code=$?
          set -e
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 2 ]; then
            echo "::warning::Marketplace/network error during scheduled check (exit 2); skipping issue creation."
          fi
          if [ "$code" -eq 0 ]; then
            # Write the sentinel so actions/cache saves it under the key at job end,
            # letting the next run with an unchanged key skip the downloads.
            echo "ok" > .patchcheck-pass
          fi
          exit "$code"

      - name: Open tracking issue on regression
        # Only a real regression (exit 1) opens an issue; infra errors (exit 2) are skipped.
        if: failure() && steps.check.outputs.code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Upstream Claude Code regex check failed";
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "upstream-break",
              per_page: 50,
            });
            if (existing.data.some((issue) => issue.title === title)) {
              core.info("An open tracking issue already exists; skipping creation.");
              return;
            }
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                "The daily upstream patchability check failed: one or more of the latest 3 anthropic.claude-code builds no longer apply/verify cleanly.",
                "",
                "This usually means upstream changed the minified output and the patcher's regexes in `patch-regexes.js` need to be updated before users on the new build will get a working patch. See the run logs for the specific failing version(s).",
                "",
                `Workflow run: ${runUrl}`,
              ].join("\n"),
              labels: ["upstream-break"],
            });
