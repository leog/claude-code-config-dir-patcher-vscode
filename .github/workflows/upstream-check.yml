name: Upstream patchability check

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run patchability check
        id: check
        run: |
          set +e
          node scripts/check-upstream-patchability.mjs
          code=$?
          set -e
          echo "code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 2 ]; then
            echo "::warning::Marketplace/network error during scheduled check (exit 2); skipping issue creation."
          fi
          exit "$code"

      - name: Open tracking issue on regression
        # Only a real regression (exit 1) opens an issue; infra errors (exit 2) are skipped.
        if: failure() && steps.check.outputs.code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Upstream Claude Code regex check failed";
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "upstream-break",
              per_page: 50,
            });
            if (existing.data.some((issue) => issue.title === title)) {
              core.info("An open tracking issue already exists; skipping creation.");
              return;
            }
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                "The daily upstream patchability check failed: one or more of the latest 3 anthropic.claude-code builds no longer apply/verify cleanly.",
                "",
                "This usually means upstream changed the minified output and the patcher's regexes in `patch-regexes.js` need to be updated before users on the new build will get a working patch. See the run logs for the specific failing version(s).",
                "",
                `Workflow run: ${runUrl}`,
              ].join("\n"),
              labels: ["upstream-break"],
            });
