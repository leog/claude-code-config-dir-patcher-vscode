name: Upstream patchability check

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run patchability check
        id: check
        run: node scripts/check-upstream-patchability.mjs

      - name: Open tracking issue on regression
        if: failure() && steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Upstream Claude Code regex check failed";
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "upstream-break",
              per_page: 50,
            });
            if (existing.data.some((issue) => issue.title === title)) {
              core.info("An open tracking issue already exists; skipping creation.");
              return;
            }
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                "The daily upstream patchability check failed: neither the env-patch needle nor the already-patched form matched the latest anthropic.claude-code VSIX.",
                "",
                "This usually means upstream changed the minified output and the patcher's `ENV_NEEDLE_REGEX` / `ENV_PATCHED_REGEX` in `extension.js` need to be updated before users on the new build will get a working patch.",
                "",
                `Workflow run: ${runUrl}`,
              ].join("\n"),
              labels: ["upstream-break"],
            });
